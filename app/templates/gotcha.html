<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compromised</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #e10600;
      font-family: "Courier New", monospace;
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 34px; margin: 0 0 16px; text-shadow: 0 0 12px rgba(225,6,0,.6); }
    .sig { font-size: 20px; color: #ff4b3e; margin-bottom: 36px; letter-spacing: 1px; }
    .label { color: #888; font-size: 14px; margin-bottom: 8px; }
    .countdown { font-size: 56px; font-weight: bold; color: #fff; letter-spacing: 3px; }
    .pirate { font-size: 72px; margin-top: 24px; line-height: 1; }

    /* Reveal popup */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 10;
    }
    .overlay.show { display: flex; }
    .modal {
      background: #fff;
      color: #1c2733;
      max-width: 440px;
      width: 100%;
      border-radius: 10px;
      padding: 28px;
      font-family: "Segoe UI", Arial, sans-serif;
      box-shadow: 0 10px 40px rgba(0,0,0,.5);
    }
    .modal h2 { margin: 0 0 12px; font-size: 22px; color: #0b5394; }
    .modal p { font-size: 15px; line-height: 1.6; margin: 0 0 12px; }
    .modal a { color: #0b5394; font-weight: 600; }
    .modal button {
      margin-top: 10px;
      background: #0b5394;
      color: #fff;
      border: none;
      padding: 11px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>You just fell into a phishing attack.</h1>
  <div class="sig">Thanks for your credentials.</div>

  <div class="label">Your data will be released in:</div>
  <div class="countdown" id="countdown">05:00</div>
  <div class="pirate" aria-label="pirate">☠️</div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>Just kidding 🙂</h2>
      <p>This is a phishing <strong>test</strong> Shay Guedj ran for security awareness.</p>
      <p>No data was leaked and nothing bad happened. Please report at:
        <a href="mailto:{{ report_email }}">{{ report_email }}</a>
      </p>
      <button onclick="window.location.href='/tips'">How can I avoid this in the future?</button>
    </div>
  </div>

  <script>
    // 5-minute visual countdown.
    var remaining = 5 * 60;
    var el = document.getElementById("countdown");
    function tick() {
      var m = Math.floor(remaining / 60);
      var s = remaining % 60;
      el.textContent = (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
      if (remaining > 0) { remaining--; }
    }
    tick();
    setInterval(tick, 1000);

    // Reveal the "just kidding" popup after 4 seconds.
    setTimeout(function () {
      document.getElementById("overlay").classList.add("show");
    }, 4000);
  </script>
</body>
</html>

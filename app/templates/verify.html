<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payroll Portal — Verify Your Information</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f0f2f5;
      color: #1c2733;
    }
    .topbar {
      background: #0b5394;
      color: #fff;
      padding: 14px 24px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: .3px;
    }
    .wrap {
      max-width: 460px;
      margin: 48px auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 14px rgba(0,0,0,.08);
      padding: 32px;
    }
    h1 { font-size: 20px; margin: 0 0 6px; }
    .sub { color: #5a6b7b; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
    .notice {
      background: #fff8e1;
      border: 1px solid #ffe082;
      color: #7a5b00;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 22px;
    }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #c5cdd6;
      border-radius: 6px;
      font-size: 15px;
      margin-bottom: 18px;
    }
    input:focus { outline: none; border-color: #0b5394; box-shadow: 0 0 0 2px rgba(11,83,148,.15); }
    button {
      width: 100%;
      background: #0b5394;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #094376; }
    .foot { text-align: center; color: #9aa7b3; font-size: 11px; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="topbar">IConduct &middot; Payroll Self-Service</div>
  <div class="wrap">
    <h1>Verify your information</h1>
    <form method="POST" action="/submit">
      <label for="full_name">Full name</label>
      <input id="full_name" name="full_name" type="text" required />

      <label for="work_email">Email</label>
      <input id="work_email" name="work_email" type="email" required />

      <button type="submit">Verify &amp; continue</button>
    </form>
    <p class="foot">© IConduct. This is a secure internal portal.</p>
  </div>
</body>
</html>
